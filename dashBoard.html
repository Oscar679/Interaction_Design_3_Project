<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script type="module" src="./components/ui/NavBar.js"></script>
    <script type="module" src="./components/ui/SensorChart.js"></script>
    <script type="module" src="./components/ui/SMHIChart.js"></script>
    <script type="module" src="./components/ui/ButtonGroup.js"></script>
    <script type="module" src="./components/ui/RefreshButton.js"></script>
    <script type="module" src="./components/ui/PageLoader.js"></script>
    <script type="module" src="./components/ui/ParticleCanvas.js"></script>
    <script type="module" src="./components/ui/AvgSensorTemp.js"></script>
    <script type="module" src="./components/ui/AvgSmhiTemp.js"></script>
    <link rel="stylesheet" href="./src/index.css">
    <link rel="manifest" href="/manifest.json">
    <title>Dashboard – Campus Weather</title>
</head>

<body class="bg-gray-950 relative overflow-x-hidden">
    <particle-canvas></particle-canvas>
    <page-loader></page-loader>
    <nav-bar></nav-bar>

    <!-- Background accent blobs -->
    <div aria-hidden="true" class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 -right-40 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
    </div>

    <!-- Page header -->
    <div class="mx-auto max-w-7xl px-6 pt-10 pb-2">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white">Dashboard</h1>
                <p class="text-sm text-gray-400 mt-1">Campus Växjö sensor data vs. SMHI official readings</p>
            </div>
            <div class="flex items-center gap-3">
                <button-group></button-group>
                <refresh-button></refresh-button>
            </div>
        </div>
        <div class="h-px bg-white/10 mt-6"></div>
    </div>

    <!-- Stat cards -->
    <div class="mx-auto max-w-7xl px-6 pt-6">
        <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
            <div class="bg-white/5 backdrop-blur-md rounded-xl px-8 py-6 border border-white/10 shadow-lg hover:border-white/20 transition-all duration-300">
                <avg-temperature></avg-temperature>
            </div>
            <div class="bg-white/5 backdrop-blur-md rounded-xl px-8 py-6 border border-white/10 shadow-lg hover:border-white/20 transition-all duration-300">
                <avg-smhi-temperature></avg-smhi-temperature>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="mx-auto max-w-7xl px-6 py-6 pb-16">
        <div class="grid grid-cols-1 gap-5 lg:grid-cols-2">
            <div class="bg-white/5 backdrop-blur-md rounded-xl p-8 border border-white/10 shadow-lg hover:border-white/20 transition-all duration-300">
                <sensor-chart></sensor-chart>
            </div>
            <div class="bg-white/5 backdrop-blur-md rounded-xl p-8 border border-white/10 shadow-lg hover:border-white/20 transition-all duration-300">
                <smhi-chart></smhi-chart>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="border-t border-white/10 mt-8">
        <div class="mx-auto max-w-7xl px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-3">
            <p class="text-sm text-gray-500">Campus Weather &mdash; Linnaeus University</p>
            <p class="text-xs text-gray-600">Sensor data &amp; SMHI Open Data API</p>
        </div>
    </footer>

</body>

</html>
